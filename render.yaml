# Render blueprint — one web service serves the SPA + API + Socket.IO.
# Dashboard → New → Blueprint → pick this repo. Set the two DB URLs when asked.
services:
  - type: web
    name: brivia
    runtime: node
    region: singapore # closest Render region to India; move behind Cloudflare for CDN
    plan: free # sleeps after ~15 min idle (30s cold start); upgrade to starter for launch
    # --include=dev: NODE_ENV=production makes npm skip devDeps (vite, prisma CLI) otherwise
    buildCommand: npm ci --include=dev && VITE_BASE=/ npm run build && cd server && npm ci --include=dev && npx prisma generate && npx prisma migrate deploy
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # Supabase "Transaction pooler" URI (:6543) + ?pgbouncer=true
        sync: false
      - key: DIRECT_URL # Supabase "Direct connection" URI (:5432)
        sync: false
      - key: JWT_SECRET
        generateValue: true
